# Spin up isolated Gas Town instances. Used by the gt-docker script.
#
# Each instance gets its own named volumes for /gt (town) and /home/agent (home),
# namespaced via COMPOSE_PROJECT_NAME set by gt-docker.
#
# Manual usage:
#   COMPOSE_PROJECT_NAME=gt-alpha GT_INSTANCE=alpha docker compose up -d

services:
  gastown:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gastown-${GT_INSTANCE:?Set GT_INSTANCE}
    user: root
    stdin_open: false
    tty: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - NET_RAW
    environment:
      IS_SANDBOX: 1
      GT_INSTANCE: ${GT_INSTANCE}
      GT_COST_TIER: ${GT_COST_TIER:-budget}
      GIT_USER: ${GIT_USER:-TestUser}
      GIT_EMAIL: ${GIT_EMAIL:-test@example.com}
      SSH_AUTH_SOCK: /run/host-services/ssh-auth.sock
    volumes:
      - town:/gt
      - home:/home/agent
      - ${SSH_AUTH_SOCK:-/run/host-services/ssh-auth.sock}:/run/host-services/ssh-auth.sock
    ports:
      - "${DASHBOARD_PORT:-0}:8080"
      - "${TERMINAL_PORT:-0}:7681"
      - "${WEB_PORTS:-3000-3050:3000-3050}"
    command: sleep infinity

volumes:
  town:
  home:
